<script>
  const $ = (id) => document.getElementById(id);

  // ===== estado =====
  let ws = null;
  let playerId = null;
  let state = null;

  // keepalive
  let pingTimer = null;

  // reconexão
  let reconnectTimer = null;
  let reconnectAttempts = 0;
  let manualClose = false;

  // overlay timer
  const OVERLAY_MS = 6500;
  const OVERLAY_GAMEOVER_MS = 10000;
  let overlayTimeout = null;
  let overlayInterval = null;

  // =====================
  // Painel da Partida
  // =====================
  const matchHistory = []; // [{ round_num, total, winner, hands, guesses, game_over }]
  const MAX_HISTORY = 50;

  function setPanelMeta(s){
    $("panelPhase").textContent = `fase: ${s.phase ?? "-"}`;
    $("panelRound").textContent = `rodada: ${s.round_num ?? "-"}`;
    $("panelTurn").textContent = s.turn_player_name ? `vez: ${s.turn_player_name}` : "vez: -";
  }

  function pushRevealToHistory(revealMsg){
    if (!revealMsg || !revealMsg.result) return;
    const r = revealMsg.result;

    matchHistory.push({
      round_num: r.round_num,
      total: r.total,
      winner: r.winner || null,
      hands: r.hands || {},
      guesses: r.guesses || {},
      game_over: revealMsg.game_over || null
    });

    while (matchHistory.length > MAX_HISTORY) matchHistory.shift();

    renderHistory();
    drawRoundChart();
  }

  function renderHistory(){
    const box = $("roundHistory");
    box.innerHTML = "";

    if (!matchHistory.length){
      box.innerHTML = `<p class="subtitle" style="margin:0;">Sem rodadas ainda. Assim que rolar uma revelação, aparece aqui.</p>`;
      return;
    }

    const reversed = [...matchHistory].reverse();

    for (const item of reversed){
      const card = document.createElement("div");
      card.style.cssText = `
        border: 1px solid rgba(255,255,255,0.10);
        background: rgba(255,255,255,0.05);
        border-radius: 14px;
        padding: 12px;
      `;

      const winnerLine = item.winner
        ? `🏆 <b>${item.winner}</b> acertou e perdeu 1 bolinha.`
        : `Ninguém acertou nesta rodada.`;

      const go = item.game_over
        ? `<div style="margin-top:8px; color: rgba(255,255,255,0.90);">
             🧨 <b>Fim de jogo</b> — Perdedor: <b>${item.game_over.loser ?? "?"}</b>
           </div>`
        : "";

      const handsTxt = Object.entries(item.hands).map(([n,v]) => `${n}: ${v}`).join(" • ") || "-";
      const guessesTxt = Object.entries(item.guesses).map(([n,v]) => `${n}: ${v}`).join(" • ") || "-";

      card.innerHTML = `
        <div style="display:flex; gap:10px; flex-wrap:wrap; align-items:center;">
          <span class="pill">Rodada <b>${item.round_num}</b></span>
          <span class="pill">Total: <b>${item.total}</b></span>
          <span class="pill">${winnerLine}</span>
        </div>
        <div class="subtitle" style="margin-top:10px;">
          <b>Mãos:</b> ${handsTxt}
        </div>
        <div class="subtitle" style="margin-top:6px;">
          <b>Palpites:</b> ${guessesTxt}
        </div>
        ${go}
      `;

      box.appendChild(card);
    }
  }

  function drawRoundChart(){
    const c = $("roundChart");
    const ctx = c.getContext("2d");
    const W = c.width;
    const H = c.height;

    ctx.clearRect(0,0,W,H);

    ctx.fillStyle = "rgba(255,255,255,0.02)";
    ctx.fillRect(0,0,W,H);

    if (!matchHistory.length){
      ctx.fillStyle = "rgba(255,255,255,0.65)";
      ctx.font = "16px system-ui";
      ctx.fillText("Sem dados ainda (aguardando rodadas)...", 18, 40);
      return;
    }

    const data = matchHistory.slice(-12); // últimas 12
    const maxVal = Math.max(...data.map(x => x.total), 1);

    const pad = 22;
    const chartW = W - pad*2;
    const chartH = H - pad*2 - 18;

    ctx.strokeStyle = "rgba(255,255,255,0.15)";
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(pad, pad);
    ctx.lineTo(pad, pad + chartH);
    ctx.lineTo(pad + chartW, pad + chartH);
    ctx.stroke();

    const n = data.length;
    const gap = 10;
    const barW = Math.max(18, Math.floor((chartW - gap*(n-1)) / n));

    for (let i=0; i<n; i++){
      const item = data[i];
      const frac = item.total / maxVal;
      const bh = Math.floor(chartH * frac);
      const x = pad + i*(barW + gap);
      const y = pad + chartH - bh;

      ctx.fillStyle = "rgba(255,255,255,0.82)";
      ctx.fillRect(x, y, barW, bh);

      ctx.fillStyle = "rgba(255,255,255,0.65)";
      ctx.font = "12px system-ui";
      ctx.fillText(String(item.round_num), x + 4, pad + chartH + 14);

      ctx.fillStyle = "rgba(255,255,255,0.85)";
      ctx.fillText(String(item.total), x + 4, y - 6);
    }

    ctx.fillStyle = "rgba(255,255,255,0.85)";
    ctx.font = "14px system-ui";
    ctx.fillText("Total de bolinhas por rodada (últimas 12)", pad, 18);
  }

  $("clearHistory").onclick = () => {
    matchHistory.length = 0;
    renderHistory();
    drawRoundChart();
  };

  // ===== util =====
  function setError(msg = "") { $("err").textContent = msg; }
  function setHint(msg = "") { $("hint").textContent = msg; }

  function roomKeyStorageKey(roomId) { return `bolinhas:key:${roomId}`; }
  function currentRoom() { return ($("room").value || "").trim().toUpperCase(); }

  function setConnected(ok) {
    $("connStatus").textContent = ok ? "Conectado" : "Desconectado";
    $("connDot").className = `dot ${ok ? "on" : "off"}`;
  }

  function showBoxes({ hand=false, guess=false, waiting=false } = {}) {
    $("handBox").style.display = hand ? "block" : "none";
    $("guessBox").style.display = guess ? "block" : "none";
    $("waitingBox").style.display = waiting ? "block" : "none";
  }

  function you() {
    if (!state || !playerId) return null;
    return state.players.find(p => p.player_id === playerId) || null;
  }
  function isHost() { return state && playerId && state.host_player_id === playerId; }
  function clamp(n, a, b) { return Math.max(a, Math.min(b, n)); }

  // ===== overlay timer =====
  function stopOverlayTimers(){
    if (overlayTimeout) clearTimeout(overlayTimeout);
    if (overlayInterval) clearInterval(overlayInterval);
    overlayTimeout = null;
    overlayInterval = null;
  }

  function startOverlayTimer(durationMs){
    stopOverlayTimers();

    const start = Date.now();
    const end = start + durationMs;

    function tick(){
      const now = Date.now();
      const remain = Math.max(0, end - now);
      const frac = remain / durationMs;

      $("ovTimerFill").style.width = `${(frac * 100).toFixed(1)}%`;
      $("ovTimerText").textContent = `Fechando em ${Math.ceil(remain/1000)}s`;

      if (remain <= 0) {
        $("overlay").classList.remove("show");
        stopOverlayTimers();
      }
    }

    tick();
    overlayInterval = setInterval(tick, 50);
    overlayTimeout = setTimeout(() => {
      $("overlay").classList.remove("show");
      stopOverlayTimers();
    }, durationMs);
  }

  function showOverlay(result, gameOver) {
    $("overlay").classList.add("show");
    $("ovTitle").textContent = `Revelação — Rodada ${result.round_num}`;
    $("ovMeta").textContent = gameOver
      ? `Fim de jogo! Perdedor: ${gameOver.loser ?? "Empate raro"}`
      : "Resultado da rodada.";
    $("ovTotal").textContent = String(result.total);

    if (result.winner) {
      $("ovWinner").style.display = "flex";
      $("ovWinnerText").textContent = `${result.winner} acertou e perde 1 bolinha`;
    } else {
      $("ovWinner").style.display = "none";
      $("ovWinnerText").textContent = "";
    }

    startOverlayTimer(gameOver ? OVERLAY_GAMEOVER_MS : OVERLAY_MS);
  }

  $("closeOverlay").onclick = () => { $("overlay").classList.remove("show"); stopOverlayTimers(); };
  $("overlay").onclick = (e) => { if (e.target === $("overlay")) { $("overlay").classList.remove("show"); stopOverlayTimers(); } };

  // ===== UI =====
  function renderOrderBar(s) {
    const bar = $("orderBar");
    bar.innerHTML = "";

    if (!s.round_order || !s.round_order.length || s.phase === "lobby") {
      const c = document.createElement("div");
      c.className = "chip";
      c.innerHTML = `<span class="miniDot"></span><span>Ordem: (ainda não começou)</span>`;
      bar.appendChild(c);
      return;
    }

    s.round_order.forEach((pl, idx) => {
      const chip = document.createElement("div");
      chip.className = "chip" + (pl.player_id === s.turn_player_id ? " turn" : "");
      chip.innerHTML = `<span class="miniDot"></span><span>${idx+1}. ${pl.name}</span>`;
      bar.appendChild(chip);
    });
  }

  function ballsHTML(ballsLeft, maxBalls = 3) {
    const wrap = document.createElement("span");
    wrap.className = "balls";
    for (let i = 0; i < maxBalls; i++) {
      const b = document.createElement("span");
      b.className = "ball" + (i < ballsLeft ? " filled" : "");
      wrap.appendChild(b);
    }
    return wrap;
  }

  function renderPlayers(s) {
    const list = $("players");
    list.innerHTML = "";

    s.players.forEach(p => {
      const row = document.createElement("div");
      row.className = "playerRow";

      const isTurn = (p.player_id === s.turn_player_id);
      if (isTurn) row.classList.add("turnPlayer");

      const pct = clamp((p.balls_left / 3) * 100, 0, 100);

      row.innerHTML = `
        <div>
          <div class="nameLine">
            <b class="${isTurn ? "turnName" : ""}"></b>
            ${p.is_host ? `<span class="miniTag host">host</span>` : ""}
            ${!p.alive ? `<span class="miniTag">fora</span>` : ""}
            ${(s.phase !== "lobby")
              ? `<span class="miniTag ${p.hand_submitted ? "ok" : "wait"}">mão ${p.hand_submitted ? "✅" : "⏳"}</span>` : ""}
            ${(s.phase === "guesses" || s.phase === "reveal" || s.phase === "over")
              ? `<span class="miniTag ${p.guess_submitted ? "ok" : "wait"}">palpite ${p.guess_submitted ? "✅" : "⏳"}</span>` : ""}
            ${isTurn ? `<span class="miniTag host">VEZ</span>` : ""}
          </div>
          <div class="subtitle" style="margin:6px 0 0;">
            ${p.connected ? "🟢 online" : "⚫ offline"} • estoque: ${p.balls_left}/3
          </div>
        </div>
        <div class="rightBox"></div>
      `;

      row.querySelector("b").textContent = p.name + (p.player_id === playerId ? " (VOCÊ)" : "");

      const rb = row.querySelector(".rightBox");
      rb.appendChild(ballsHTML(p.balls_left, 3));

      const barWrap = document.createElement("div");
      barWrap.className = "barWrap";
      const barFill = document.createElement("div");
      barFill.className = "barFill";
      barFill.style.width = `${pct}%`;
      barWrap.appendChild(barFill);
      rb.appendChild(barWrap);

      if (isHost() && p.player_id !== playerId) {
        const kick = document.createElement("button");
        kick.className = "kickBtn";
        kick.textContent = "Expulsar";
        kick.onclick = () => {
          const ok = confirm(`Remover "${p.name}" da sala?`);
          if (ok) send("kick", { target_id: p.player_id });
        };
        rb.appendChild(kick);
      }

      list.appendChild(row);
    });
  }

  function renderHandQuick(maxHand) {
    const q = $("handQuick");
    q.innerHTML = "";
    for (let v = 0; v <= 3; v++) {
      const b = document.createElement("button");
      b.textContent = `${v}`;
      b.disabled = v > maxHand;
      b.onclick = () => { $("hand").value = String(v); };
      q.appendChild(b);
    }
  }

  function renderGuessesPublic(s) {
    $("usedGuesses").textContent = (s.used_guesses || []).join(", ") || "-";
    const gp = s.guesses_public || [];
    if (s.phase === "guesses" && gp.length) {
      $("usedGuesses").textContent = gp.map(x => `${x.name}: ${x.guess}`).join("  •  ");
    }
  }

  function renderState(s) {
    state = s;

    $("phasePill").textContent = `fase: ${s.phase}`;
    $("roundPill").textContent = `rodada: ${s.round_num || "-"}`;
    $("roomPill").textContent = `sala: ${s.room_id || "-"}`;
    $("turnPill").textContent = s.turn_player_name ? `vez: ${s.turn_player_name}` : "vez: -";

    // painel meta
    setPanelMeta(s);

    $("start").disabled = !(s.phase === "lobby" && isHost());
    $("restart").disabled = !isHost();
    $("skip").disabled = !(isHost() && (s.phase === "hands" || s.phase === "guesses"));

    $("maxGuess").textContent = (s.max_guess ?? "-");

    renderGuessesPublic(s);
    renderOrderBar(s);
    renderPlayers(s);

    const me = you();
    $("handAck").textContent = "";
    $("guessAck").textContent = "";

    if (!me) {
      showBoxes({ waiting: true });
      $("waitingText").textContent = "Você ainda não foi reconhecido na sala.";
      return;
    }

    if (!me.alive && s.phase !== "lobby") {
      showBoxes({ waiting: true });
      $("waitingText").textContent = "Você está fora do jogo. Agora é espectador. 🍿";
      return;
    }

    if (s.phase === "lobby") {
      showBoxes({ waiting: true });
      $("waitingText").textContent = isHost()
        ? "Você é o host. Quando tiver pelo menos 2 jogadores, clique em Iniciar."
        : "Aguardando o host iniciar...";
      return;
    }

    if (s.phase === "hands") {
      // é sua vez?
      if (s.turn_player_id === me.player_id && !me.hand_submitted) {
        const maxHand = clamp(me.balls_left ?? 0, 0, 3);
        $("hand").max = String(maxHand);
        $("hand").value = String(clamp(parseInt($("hand").value || "0", 10), 0, maxHand));
        renderHandQuick(maxHand);
        showBoxes({ hand: true });
        return;
      }

      if (me.hand_submitted) {
        showBoxes({ waiting: true });
        $("waitingText").textContent = "Você já enviou sua mão. Aguardando os demais...";
        return;
      }

      showBoxes({ waiting: true });
      $("waitingText").textContent = `Aguardando sua vez na fase HANDS...`;
      return;
    }

    if (s.phase === "guesses") {
      if (s.turn_player_id === me.player_id && !me.guess_submitted) {
        const mg = s.max_guess ?? 30;
        $("guess").min = "0";
        $("guess").max = String(mg);
        $("guess").value = String(clamp(parseInt($("guess").value || "0", 10), 0, mg));
        showBoxes({ guess: true });
        return;
      }

      if (me.guess_submitted) {
        showBoxes({ waiting: true });
        $("waitingText").textContent = "Você já enviou seu palpite. Aguardando os demais...";
        return;
      }

      showBoxes({ waiting: true });
      $("waitingText").textContent = "Aguardando sua vez na fase GUESSES...";
      return;
    }

    if (s.phase === "reveal") {
      showBoxes({ waiting: true });
      $("waitingText").textContent = "Revelando...";
      return;
    }

    if (s.phase === "over") {
      showBoxes({ waiting: true });
      $("waitingText").textContent = "Partida encerrada. O host pode reiniciar.";
      return;
    }

    showBoxes({ waiting: true });
    $("waitingText").textContent = "Aguardando...";
  }

  // ===== WS =====
  function wsUrl(room, name, key){
    const proto = (location.protocol === "https:") ? "wss" : "ws";
    const base = `${proto}://${location.host}`;
    const qs = new URLSearchParams();
    qs.set("name", name);
    if (key) qs.set("key", key);
    return `${base}/ws/${encodeURIComponent(room)}?${qs.toString()}`;
  }

  function startPing(){
    stopPing();
    pingTimer = setInterval(() => {
      if (ws && ws.readyState === 1) send("ping", {});
    }, 20000);
  }
  function stopPing(){
    if (pingTimer) clearInterval(pingTimer);
    pingTimer = null;
  }

  function stopReconnect(){
    if (reconnectTimer) clearTimeout(reconnectTimer);
    reconnectTimer = null;
  }

  function scheduleReconnect(){
    stopReconnect();
    if (manualClose) return;

    reconnectAttempts += 1;
    const waitMs = Math.min(12000, 800 + reconnectAttempts * 900);

    setHint(`Reconectando em ${Math.ceil(waitMs/1000)}s... (tentativa ${reconnectAttempts})`);
    reconnectTimer = setTimeout(() => {
      connect();
    }, waitMs);
  }

  function send(type, payload){
    if (!ws || ws.readyState !== 1) return;
    ws.send(JSON.stringify({ type, ...payload }));
  }

  function closeWs(){
    manualClose = true;
    stopPing();
    stopReconnect();
    try { ws && ws.close(); } catch {}
    ws = null;
    setConnected(false);
  }

  function connect(){
    setError("");
    const name = ($("name").value || "").trim() || "Jogador";
    const room = currentRoom();
    if (!room) { setError("Informe a sala."); return; }

    manualClose = false;

    const savedKey = localStorage.getItem(roomKeyStorageKey(room)) || "";
    const url = wsUrl(room, name, savedKey);

    try {
      ws = new WebSocket(url);
    } catch (e) {
      setError("Falha ao abrir WebSocket.");
      return;
    }

    ws.onopen = () => {
      setConnected(true);
      setHint("Conectado.");
      reconnectAttempts = 0;
      startPing();
    };

    ws.onmessage = (ev) => {
      let msg = null;
      try { msg = JSON.parse(ev.data); } catch { return; }

      if (msg.type === "joined") {
        playerId = msg.player_id;
        $("room").value = msg.room_id || room;
        $("roomPill").textContent = `sala: ${msg.room_id || room}`;

        if (msg.player_key) {
          localStorage.setItem(roomKeyStorageKey(room), msg.player_key);
        }
        return;
      }

      if (msg.type === "state") {
        renderState(msg.state);
        return;
      }

      if (msg.type === "reveal") {
        // salva histórico + desenha painel
        pushRevealToHistory(msg);

        // overlay
        showOverlay(msg.result, msg.game_over || null);
        return;
      }

      if (msg.type === "kicked") {
        setError(msg.message || "Você foi removido da sala.");
        closeWs();
        return;
      }

      if (msg.type === "pong") return;
    };

    ws.onclose = () => {
      stopPing();
      setConnected(false);
      if (!manualClose) scheduleReconnect();
    };

    ws.onerror = () => {
      setConnected(false);
      // onclose vai cuidar da reconexão
    };
  }

  // ===== API / botões =====
  $("create").onclick = async () => {
    setError("");
    setHint("Criando sala...");

    try {
      const resp = await fetch("/api/create-room", { method: "GET" });
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const data = await resp.json();
      if (!data.room_id) throw new Error("room_id ausente");

      $("room").value = String(data.room_id).toUpperCase();
      setHint(`Sala criada: ${$("room").value}`);
    } catch (e) {
      setError("Falha ao criar sala. Veja o Console/Network para detalhes.");
      setHint("");
    }
  };

  $("connect").onclick = () => connect();

  $("copyLink").onclick = async () => {
    const room = currentRoom();
    if (!room) { setError("Informe a sala para copiar o link."); return; }
    const url = `${location.origin}/?room=${encodeURIComponent(room)}`;
    try {
      await navigator.clipboard.writeText(url);
      setHint("Link copiado!");
    } catch {
      setHint(url);
    }
  };

  $("start").onclick = () => send("start", {});
  $("restart").onclick = () => send("restart", {});
  $("skip").onclick = () => send("skip", {});

  $("sendHand").onclick = () => {
    const v = clamp(parseInt($("hand").value || "0", 10), 0, 3);
    send("hand", { value: v });
    $("handAck").textContent = "Enviado ✅";
  };

  $("sendGuess").onclick = () => {
    const v = parseInt($("guess").value || "0", 10);
    send("guess", { value: v });
    $("guessAck").textContent = "Enviado ✅";
  };

  // ===== boot: preencher room via querystring =====
  (function init(){
    setConnected(false);
    renderHistory();
    drawRoundChart();

    const qs = new URLSearchParams(location.search);
    const r = (qs.get("room") || "").trim().toUpperCase();
    if (r) $("room").value = r;
  })();
</script>
